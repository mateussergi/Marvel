<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Marvel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&display=swap" rel="stylesheet">

<body>

    <header class="header">
        <nav class="nav">
            <h1 class="logo">MARVEL</h1>
            <ul class="menu">
                <li><a href="#">Início</a></li>
                <li><a href="#">Heróis</a></li>
                <li><a href="#">Sobre</a></li>
            </ul>
        </nav>

        <div class="hero">
            <h2>Os Vingadores</h2>
            <p>Os seis heróis que deram início ao universo cinematográfico.</p>
        </div>
    </header>

    <section class="container">

        <div class="card ironman">
            <img src="img/hfe.jpg">
            <div class="content">
                <h2>Homem de Ferro</h2>
            </div>
        </div>

        <div class="card capitao">
            <img src="img/cap.jpg">
            <div class="content">
                <h2>Capitão América</h2>
            </div>
        </div>

        <div class="card thor">
            <img src="img/thor.jpg">
            <div class="content">
                <h2>Thor</h2>
            </div>
        </div>

        <div class="card hulk">
            <img src="img/hulk.webp">
            <div class="content">
                <h2>Hulk</h2>
            </div>
        </div>

        <div class="card viuvanegra">
            <img src="img/viuva.jpg">
            <div class="content">
                <h2>Viúva Negra</h2>
            </div>
        </div>

        <div class="card gaviarqueiro">
            <img src="img/haw.webp">
            <div class="content">
                <h2>Gavião Arqueiro</h2>
            </div>
        </div>

    </section>

    <footer class="footer">
        <p>© 2026 Portfolio Marvel</p>
    </footer>

</html>
